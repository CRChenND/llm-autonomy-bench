name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Firebase config
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
        run: |
          if [ -z "$FIREBASE_CONFIG_JSON" ]; then
            echo "::error::FIREBASE_CONFIG_JSON repository secret is not set. Add strict JSON in Settings > Secrets and variables > Actions."
            exit 1
          fi
          node -e "try { JSON.parse(process.env.FIREBASE_CONFIG_JSON) } catch (error) { console.error('::error::FIREBASE_CONFIG_JSON must be strict JSON, without const firebaseConfig ='); process.exit(1) }"
          printf 'export const firebaseConfig = %s;\n' "$FIREBASE_CONFIG_JSON" > docs/firebase-config.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
